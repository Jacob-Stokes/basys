version: '3.8'

services:
  thesys:
    build: .
    ports:
      - "4000:3001"
    volumes:
      - ./data:/app/data
      - .:/workspace:ro
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
      - vault_data:/vault
    environment:
      - DATABASE_URL=file:/app/data/harada.db
      - NODE_ENV=production
      - PORT=3001
      - SESSION_SECRET=change-me-to-something-secure
      - TERMINAL_SHARED_SECRET=thesys-terminal-secret-change-me
      - VAULT_PATH=/vault
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:4000/api/google-calendar/callback}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MCP_SERVER_URL=${MCP_SERVER_URL:-https://home.jacob.st}
    restart: unless-stopped

  terminal:
    build: ./terminal
    ports:
      - "4001:4001"
    volumes:
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
      - .:/workspace
      - ./data:/app/data
    environment:
      - PORT=4001
      - TERMINAL_SHARED_SECRET=thesys-terminal-secret-change-me
      - TERMINAL_CWD=/workspace
    depends_on:
      - thesys
    restart: unless-stopped

  obsidian:
    build: ./obsidian
    volumes:
      - vault_data:/vault
    environment:
      - OBSIDIAN_EMAIL=${OBSIDIAN_EMAIL:-}
      - OBSIDIAN_PASSWORD=${OBSIDIAN_PASSWORD:-}
      - OBSIDIAN_VAULT_NAME=${OBSIDIAN_VAULT_NAME:-thesys}
    restart: unless-stopped

volumes:
  vault_data:
