version: '3.8'

services:
  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache python3 make g++ && npm install && npm run dev"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ~/.claude:/root/.claude
      - backend_node_modules:/app/node_modules
    environment:
      - DATABASE_URL=file:/app/data/harada.db
      - NODE_ENV=development
      - PORT=3001
      - SESSION_SECRET=change-me-to-something-secure
      - TERMINAL_SHARED_SECRET=basys-terminal-secret-change-me
      - FRONTEND_URL=http://localhost:4000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:4000/api/google-calendar/callback}

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "4000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=
      - VITE_PROXY_TARGET=http://backend:3001
    depends_on:
      - backend

  terminal:
    build: ./terminal
    ports:
      - "4001:4001"
    volumes:
      - ~/.claude:/root/.claude
      - .:/workspace
      - ./data:/app/data
    environment:
      - PORT=4001
      - TERMINAL_SHARED_SECRET=basys-terminal-secret-change-me
      - TERMINAL_CWD=/workspace
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules:
